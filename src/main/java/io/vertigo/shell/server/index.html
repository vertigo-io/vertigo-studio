<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BANSHEE</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --general-bg: #1A1D21;
      --general-surface: #24282D;
      --general-text: #E6E8EA;
      --general-shadow: rgba(0, 0, 0, 0.45);

      --assistant-bg: #2E3338;
      --assistant-accent: #3C4047;
      --assistant-text: #F0F1F3;

      --user-bg: #383D44;
      --user-accent: #4A4F57;
      --user-text: #FFFFFF;

      --json-bg: #1F2226;
      --json-text: #C8CDD2;
      --json-key: #8AB4F8;
      --json-string: #F1FA8C;
      --json-number: #FFB86C;
      --json-boolean: #50FA7B;
      --json-null: #FF5555;

      --table-header-bg: #2A2F35;
      --table-row-even: #212529;
      --table-row-odd: #1C2024;
      --table-hover: #2E3439;
    }

    body {
      font-family: 'Roboto', Arial, sans-serif;
      margin: 20px;
      background-color: var(--general-bg);
      color: var(--general-text);
    }

    .header-container {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 48px;
      color: var(--assistant-text);
      letter-spacing: 4px;
      margin: 0;
      text-shadow: 0 0 12px var(--assistant-accent);
    }

    #status {
      position: absolute;
      right: 0;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      font-weight: 500;
      color: var(--general-text);
      text-transform: uppercase;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .status-connected .status-dot {
      background: #50FA7B;
      box-shadow: 0 0 8px #50FA7B;
    }

    .status-disconnected .status-dot {
      background: #FF5555;
      box-shadow: 0 0 8px #FF5555;
    }

    .status-error .status-dot {
      background: #FFB86C;
      box-shadow: 0 0 8px #FFB86C;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Chat Container */
    .chat-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
      background: var(--general-surface);
      border-radius: 15px;
      box-shadow: 0 8px 32px var(--general-shadow);
      max-height: 600px;
      overflow-y: auto;
    }

    .chat-message {
      margin: 15px 0;
      padding: 14px 18px;
      border-radius: 18px;
      position: relative;
      box-shadow: 0 6px 20px var(--general-shadow);
      backdrop-filter: blur(10px);
    }

    .user-message {
      background: var(--user-bg);
      color: var(--user-text);
      margin-left: auto;
      text-align: right;
      max-width: 70%;
    }

    .response-message {
      background: var(--assistant-bg);
      color: var(--assistant-text);
      margin-right: auto;
      text-align: left;
      max-width: 70%;
    }

    /* Prompt input */
    .prompt-container {
      display: flex;
      gap: 10px;
      margin-top: 15px;
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }

    .prompt-container input {
      flex: 1;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--assistant-bg);
      background: var(--general-surface);
      color: var(--general-text);
      font-size: 16px;
    }

    .prompt-container button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: var(--assistant-bg);
      color: var(--general-text);
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s ease;
    }

    .prompt-container button:hover {
      background: var(--assistant-accent);
    }

    /* Enhanced Table Style with Pyjama Effect */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      background: var(--general-bg);
      border-radius: 8px;
      overflow: hidden;
      font-size: 14px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    th {
      background: var(--table-header-bg);
      color: var(--assistant-text);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
      position: sticky;
      top: 0;
      z-index: 1;
      border-bottom: 2px solid var(--assistant-accent);
    }

    tr:nth-child(odd) {
      background: var(--table-row-odd);
    }

    tr:nth-child(even) {
      background: var(--table-row-even);
    }

    tbody tr:hover {
      background: var(--table-hover) !important;
      transform: scale(1.01);
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
    }

    td {
      border-left: 3px solid transparent;
      transition: all 0.2s ease;
    }

    tbody tr:hover td {
      border-left: 3px solid var(--assistant-accent);
    }

    /* JSON Viewer */
    .json-container {
      background-color: var(--json-bg);
      border-radius: 8px;
      padding: 16px;
      margin-top: 10px;
      border: 1px solid var(--assistant-bg);
      font-family: 'Fira Code', 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.5;
      overflow-x: auto;
      white-space: pre;
    }

    /* JSON Container Scrollbars */
    .json-container::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    .json-container::-webkit-scrollbar-track {
      background: var(--general-bg);
      border-radius: 10px;
    }

    .json-container::-webkit-scrollbar-thumb {
      background: var(--assistant-bg);
      border-radius: 10px;
      border: 2px solid var(--json-bg);
    }

    .json-container::-webkit-scrollbar-thumb:hover {
      background: var(--assistant-accent);
    }

    .json-container::-webkit-scrollbar-corner {
      background: var(--json-bg);
    }

    .json-key { color: var(--json-key); }
    .json-string { color: var(--json-string); }
    .json-number { color: var(--json-number); }
    .json-boolean { color: var(--json-boolean); }
    .json-null { color: var(--json-null); }

    /* Scrollbar */
    .chat-container::-webkit-scrollbar {
      width: 10px;
    }

    .chat-container::-webkit-scrollbar-track {
      background: var(--general-bg);
      border-radius: 10px;
    }

    .chat-container::-webkit-scrollbar-thumb {
      background: var(--assistant-bg);
      border-radius: 10px;
      border: 2px solid var(--general-bg);
    }

    .chat-container::-webkit-scrollbar-thumb:hover {
      background: var(--assistant-accent);
    }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      .header-container {
        flex-direction: column;
        gap: 10px;
      }

      #status {
        position: static;
        transform: none;
      }

      h1 {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>
  <div class="header-container">
    <h1>BANSHEE</h1>
    <div id="status" class="status-disconnected">
      <div class="status-dot"></div>
      <span id="status-text">Connecting</span>
    </div>
  </div>

  <div class="chat-container" id="chat"></div>

  <div class="prompt-container">
    <input type="text" id="prompt" placeholder="Écrivez un message...">
    <button onclick="sendMessage()">Envoyer</button>
  </div>

  <script>
    const socket = new WebSocket("ws://localhost:8080");
    const chat = document.getElementById("chat");
    const status = document.getElementById("status");
    const statusText = document.getElementById("status-text");

    socket.onopen = () => {
      status.className = 'status-connected';
      statusText.textContent = 'Connected';
    };

    socket.onclose = () => {
      status.className = 'status-disconnected';
      statusText.textContent = 'Disconnected';
    };

    socket.onerror = () => {
      status.className = 'status-error';
      statusText.textContent = 'Error';
    };

    socket.onmessage = (event) => {
      try {
        const parsed = JSON.parse(event.data);
        if (parsed.type === "table") {
          addTable(parsed.data);
        } else if (parsed.type === "json") {
          addJson(parsed.data);
        } else {
          addMessage(JSON.stringify(parsed), "response");
        }
      } catch {
        addMessage(event.data, "response");
      }
    };

    function sendMessage() {
      const input = document.getElementById("prompt");
      const message = input.value.trim();
      if (message) {
        addMessage(message, "user");
        socket.send(message);
        input.value = "";
      }
    }

    function addMessage(text, type) {
      const div = document.createElement("div");
      div.className = `chat-message ${type === "user" ? "user-message" : "response-message"}`;
      div.textContent = text;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addTable(tableData) {
      const div = document.createElement("div");
      div.className = "chat-message response-message";
      let html = "<table><thead><tr>";
      tableData.header.forEach(h => html += `<th>${h}</th>`);
      html += "</tr></thead><tbody>";
      tableData.rows.forEach(row => {
        html += "<tr>";
        row.forEach(cell => html += `<td>${cell}</td>`);
        html += "</tr>";
      });
      html += "</tbody></table>";
      div.innerHTML = html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function addJson(obj) {
      const div = document.createElement("div");
      div.className = "chat-message response-message";
      div.innerHTML = `<div class="json-container">${syntaxHighlight(obj)}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function syntaxHighlight(json) {
      if (typeof json != 'string') json = JSON.stringify(json, null, 2);
      json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
        if (/^"/.test(match)) {
          return /:$/.test(match) ? `<span class="json-key">${match}</span>` : `<span class="json-string">${match}</span>`;
        } else if (/true|false/.test(match)) {
          return `<span class="json-boolean">${match}</span>`;
        } else if (/null/.test(match)) {
          return `<span class="json-null">${match}</span>`;
        } else {
          return `<span class="json-number">${match}</span>`;
        }
      });
    }

    document.getElementById("prompt").addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });
  </script>
</body>
</html>
