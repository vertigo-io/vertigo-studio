<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<title>BANSHEE</title>

	<!-- Google Fonts -->
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

	<!-- Lucide Icons -->
	<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
	
	<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
	<style>
		:root {
		    --general-bg: #1A1D21;
		    --general-surface: #24282D;
		    --general-text: #E6E8EA;
		    --general-shadow: rgba(0, 0, 0, 0.45);

		    --assistant-bg: #2E3338;
		    --assistant-accent: #3C4047;
		    --assistant-text: #F0F1F3;

		    --user-bg: #383D44;
		    --user-accent: #4A4F57;
		    --user-text: #FFFFFF;

		    --json-bg: #1F2226;
		    --json-text: #C8CDD2;
		    --json-key: #8AB4F8;
		    --json-string: #F1FA8C;
		    --json-number: #FFB86C;
		    --json-boolean: #50FA7B;
		    --json-null: #FF5555;

		    --table-header-bg: #1C2024;
		    --table-row-even: #2A2F35;
		    --table-row-odd: #2E3439;
		    --table-hover: #212529;

		    --x-neon-blue: #1DA1F2; /* Bleu néon de X */
		}

		body {
		    font-family: 'Roboto', Arial, sans-serif;
		    margin: 20px;
		    background-color: var(--general-bg);
		    color: var(--general-text);
		}

		.header-container {
		    display: flex;
		    align-items: center;
		    justify-content: center;
		    position: relative;
		    margin-bottom: 20px;
		}

		h1 {
		    font-family: 'Orbitron', sans-serif;
		    font-weight: 700;
		    font-size: 48px;
		    color: var(--assistant-text);
		    letter-spacing: 4px;
		    margin: 0;
		    text-shadow: 0 0 12px var(--assistant-accent);
		    position: relative;
		}

		h1 span.yellow {
		    color: #FFC107;
		}

		h1::after {
		    content: '●';
		    color: #FFC107;
		    font-size: 24px;
		    margin-left: 10px;
		    vertical-align: baseline;
		}

		#status {
		    position: absolute;
		    right: 0;
		    top: 50%;
		    transform: translateY(-50%);
		    font-size: 11px;
		    font-weight: 500;
		    color: var(--general-text);
		    text-transform: uppercase;
		    letter-spacing: 1px;
		    display: flex;
		    align-items: center;
		    gap: 6px;
		    padding: 4px 8px;
		    background: rgba(255, 255, 255, 0.05);
		    border-radius: 12px;
		    backdrop-filter: blur(10px);
		    border: 1px solid rgba(255, 255, 255, 0.1);
		}

		.status-dot {
		    width: 8px;
		    height: 8px;
		    border-radius: 50%;
		    animation: pulse 2s infinite;
		}

		.status-connected .status-dot {
		    background: #50FA7B;
		    box-shadow: 0 0 8px #50FA7B;
		}

		.status-disconnected .status-dot {
		    background: #FF5555;
		    box-shadow: 0 0 8px #FF5555;
		}

		.status-error .status-dot {
		    background: #FFB86C;
		    box-shadow: 0 0 8px #FFB86C;
		}

		@keyframes pulse {
		    0%, 100% {
		        opacity: 1;
		    }
		    50% {
		        opacity: 0.6;
		    }
		}

		.chat-container {
		    max-width: 900px;
		    margin: 0 auto;
		    padding: 20px;
		    background: var(--general-surface);
		    border-radius: 15px;
		    box-shadow: 0 8px 32px var(--general-shadow);
		    max-height: 600px;
		    overflow-y: auto;
		}

		.chat-message {
		    margin: 15px 0;
		    padding: 14px 18px;
		    border-radius: 18px;
		    position: relative;
		    box-shadow: 0 6px 20px var(--general-shadow);
		    backdrop-filter: blur(10px);
		}

		.user-message {
		    background: var(--user-bg);
		    color: var(--user-text);
		    margin-left: auto;
		    text-align: right;
		    max-width: 70%;
		    box-shadow: 0 6px 20px var(--general-shadow), 0 0 15px rgba(80, 250, 123, 0.15);
		    border: 1px solid rgba(80, 250, 123, 0.1);
		}

		.response-message {
		    background: var(--assistant-bg);
		    color: var(--assistant-text);
		    margin-right: auto;
		    text-align: left;
		    max-width: 70%;
		    box-shadow: 0 6px 20px var(--general-shadow), 0 0 15px rgba(139, 180, 248, 0.15);
		    border: 1px solid rgba(139, 180, 248, 0.1);
		}

		.prompt-container {
		    display: flex;
		    gap: 10px;
		    margin-top: 15px;
		    max-width: 900px;
		    margin-left: auto;
		    margin-right: auto;
		}

		.prompt-container input {
		    flex: 1;
		    padding: 10px;
		    border-radius: 8px;
		    border: 1px solid var(--assistant-bg);
		    background: var(--general-surface);
		    color: var(--general-text);
		    font-size: 16px;
		}

		.prompt-container button {
		    padding: 10px 18px;
		    border: none;
		    border-radius: 8px;
		    background: var(--assistant-bg);
		    color: var(--general-text);
		    cursor: pointer;
		    font-weight: bold;
		    transition: background 0.2s ease;
		}

		.prompt-container button:hover {
		    background: #FFC107;
		}

		.table-title {
		    display: flex;
		    align-items: center;
		    justify-content: space-between;
		    gap: 8px;
		    margin-bottom: 12px;
		    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
		    font-size: 14px;
		    font-weight: 500;
		    color: var(--assistant-text);
		    padding: 8px 12px;
		    background: rgba(255, 255, 255, 0.03);
		    border-radius: 6px;
		    cursor: pointer;
		    transition: all 0.2s ease;
		    user-select: none;
		}

		.table-title:hover {
		    background: rgba(255, 255, 255, 0.06);
		}

		.table-title-content {
		    display: flex;
		    align-items: center;
		    gap: 8px;
		}

		.collapse-icon {
		    width: 14px;
		    height: 14px;
		    stroke: #9CA3AF;
		    stroke-width: 2;
		    transition: transform 0.2s ease;
		}

		.collapsed .collapse-icon {
		    transform: rotate(-90deg);
		}

		.table-icon {
		    width: 16px;
		    height: 16px;
		    stroke: #9CA3AF;
		    stroke-width: 2;
		    opacity: 0.7;
		    flex-shrink: 0;
		}

		.collapsible-content {
		    overflow: hidden;
		    transition: all 0.3s ease;
		}

		.collapsible-content.collapsed {
		    max-height: 0;
		    opacity: 0;
		    margin-top: 0;
		}

		table {
		    width: 100%;
		    border-collapse: collapse;
		    margin-top: 10px;
		    background: var(--general-bg);
		    border-radius: 8px;
		    overflow: hidden;
		    font-size: 14px;
		    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
		    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
		}

		th, td {
		    padding: 12px 16px;
		    text-align: left;
		    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
		    border-left: none;
		    border-right: none;
		}

		th {
		    background: var(--table-header-bg);
		    color: #9CA3AF;
		    font-weight: 600;
		    font-family: 'JetBrains Mono', 'Consolas', 'Monaco', monospace;
		    text-transform: uppercase;
		    font-size: 11px;
		    letter-spacing: 1.2px;
		    position: sticky;
		    top: 0;
		    z-index: 1;
		    border-bottom: 2px solid var(--assistant-accent);
		}

		td {
		    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
		    font-size: 13px;
		    line-height: 1.4;
		}

		tr:nth-child(odd) {
		    background: var(--table-row-odd);
		}

		tr:nth-child(even) {
		    background: var(--table-row-even);
		}

		tbody tr:hover {
		    background: var(--table-hover) !important;
		    transform: scale(1.01);
		    transition: all 0.2s ease;
		    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.4);
		}

		td {
		    transition: all 0.2s ease;
		}

		.json-container {
		    background-color: var(--json-bg);
		    border-radius: 8px;
		    padding: 16px;
		    margin-top: 10px;
		    border: 1px solid var(--assistant-bg);
		    font-family: 'Fira Code', 'Courier New', monospace;
		    font-size: 14px;
		    line-height: 1.5;
		    overflow-x: auto;
		    white-space: pre;
		}

		.json-container::-webkit-scrollbar {
		    width: 10px;
		    height: 10px;
		}

		.json-container::-webkit-scrollbar-track {
		    background: var(--general-bg);
		    border-radius: 10px;
		}

		.json-container::-webkit-scrollbar-thumb {
		    background: var(--assistant-bg);
		    border-radius: 10px;
		    border: 2px solid var(--json-bg);
		}

		.json-container::-webkit-scrollbar-thumb:hover {
		    background: var(--assistant-accent);
		}

		.json-container::-webkit-scrollbar-corner {
		    background: var(--json-bg);
		}

		.json-key {
		    color: var(--json-key);
		}

		.json-string {
		    color: var(--json-string);
		}

		.json-number {
		    color: var(--json-number);
		}

		.json-boolean {
		    color: var(--json-boolean);
		}

		.json-null {
		    color: var(--json-null);
		}

		.chat-container::-webkit-scrollbar {
		    width: 10px;
		}

		.chat-container::-webkit-scrollbar-track {
		    background: var(--general-bg);
		    border-radius: 10px;
		}

		.chat-container::-webkit-scrollbar-thumb {
		    background: var(--assistant-bg);
		    border-radius: 10px;
		    border: 2px solid var(--general-bg);
		}

		.chat-container::-webkit-scrollbar-thumb:hover {
		    background: var(--assistant-accent);
		}

		/* Styles pour les listes dans les conteneurs collapsible */
		.list-container ul,
		.list-container ol {
		    margin: 1rem 0;
		    padding-left: 1.5rem;
		    list-style-position: outside;
		    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
		    font-size: 13px;
		    color: var(--assistant-text);
		}

		.list-container li {
		    margin-bottom: 0.5rem;
		    line-height: 1.4;
		}

		.list-container li span.nested-title {
		    font-weight: 600;
		    display: inline-block;
		    margin-right: 0.5rem;
		    color: var(--json-key);
		}

		/* Style spécifique pour DASHED : tirets personnalisés */
		.list-container .dashed-list {
		    list-style: none;
		    padding-left: 0;
		}

		.list-container .dashed-list li {
		    position: relative;
		    padding-left: 1.8rem;
		    margin-bottom: 0.6rem;
		}

		.list-container .dashed-list li::before {
		    content: "–"; /* Tiret en dash */
		    position: absolute;
		    left: 0;
		    top: 0.1em;
		    font-size: 1.3em;
		    color: var(--x-neon-blue); /* Bleu néon de X */
		    font-weight: bold;
		    text-shadow: 0 0 4px rgba(29, 161, 242, 0.5); /* Ombre adaptée au bleu néon */
		}

		/* Imbrication : indentation pour les sous-listes */
		.list-container ul ul,
		.list-container ol ol,
		.list-container ul ol,
		.list-container ol ul {
		    margin-left: 1rem;
		    padding-left: 1rem;
		    border-left: 2px solid var(--assistant-accent);
		}

		/* Styles pour les graphiques dans les conteneurs collapsible */
		.chart-container {
		    margin: 1rem 0;
		    padding: 1rem;
		    background: var(--general-bg);
		    border-radius: 8px;
		    box-shadow: 0 4px 16px var(--general-shadow);
		    border: 1px solid var(--assistant-accent);
		}

		.chart-container .chart-canvas {
		    width: 100%;
		    min-height: 300px; /* Hauteur augmentée pour barres horizontales */
		    max-height: 400px;
		    display: block;
		}

		/* Responsive pour mobile */
		@media (max-width: 768px) {
		    .header-container {
		        flex-direction: column;
		        gap: 10px;
		    }

		    #status {
		        position: static;
		        transform: none;
		    }

		    h1 {
		        font-size: 32px;
		    }

		    h1::after {
		        font-size: 16px;
		    }

		    .vertical-bar {
		        width: 32px;
		    }

		    .list-container ul,
		    .list-container ol {
		        padding-left: 1rem;
		    }
		    
		    .list-container .dashed-list li {
		        padding-left: 1.4rem;
		    }

		    .list-container .dashed-list li::before {
		        font-size: 1.1em; /* Réduction légère pour mobile */
		    }

		    .chart-container .chart-canvas {
		        min-height: 200px; /* Hauteur réduite pour mobile */
		        max-height: 300px;
		    }
			.progress-container {
			    margin: 1rem 0;
			    padding: 0.5rem;
			    background: var(--general-bg);
			    border-radius: 8px;
			    border: 1px solid var(--assistant-accent);
			    box-shadow: 0 4px 16px var(--general-shadow);
			    position: relative;
			    height: 30px; /* Hauteur fixe pour la barre */
			}

			.progress-bar {
			    height: 100%;
			    background: var(--x-neon-blue); /* Bleu néon de X */
			    border-radius: 6px;
			    transition: width 0.3s ease; /* Animation fluide pour les mises à jour */
			    box-shadow: 0 0 8px rgba(29, 161, 242, 0.5); /* Ombre néon */
			}

			.progress-bar.completed {
			    background: var(--json-boolean); /* Vert pour complétion (#50FA7B) */
			    box-shadow: 0 0 12px rgba(80, 250, 123, 0.7); /* Ombre plus forte */
			}

			.progress-text {
			    position: absolute;
			    top: 50%;
			    right: 1rem;
			    transform: translateY(-50%);
			    font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
			    font-size: 12px;
			    font-weight: 500;
			    color: var(--general-text);
			}

			/* Responsive pour mobile */
			@media (max-width: 768px) {
			    .progress-container {
			        height: 24px; /* Hauteur réduite pour mobile */
			    }

			    .progress-text {
			        font-size: 10px;
			        right: 0.5rem;
			    }
			}
		}
	</style>
</head>

<body>
	<div class="header-container">
		<h1>BAN<span class="yellow">SHEE</span></h1>
		<div id="status" class="status-disconnected">
			<div class="status-dot"></div>
			<span id="status-text">Connecting</span>
		</div>
	</div>

	<div class="chat-container" id="chat"></div>

	<div class="prompt-container">
		<input type="text" id="prompt" placeholder="Écrivez un message...">
		<button onclick="sendMessage()">Envoyer</button>
	</div>

	<script>
		const socket = new WebSocket("ws://localhost:8080");
		const chat = document.getElementById("chat");
		const status = document.getElementById("status");
		const statusText = document.getElementById("status-text");

		socket.onopen = () => {
			status.className = 'status-connected';
			statusText.textContent = 'Connected';
		};

		socket.onclose = () => {
			status.className = 'status-disconnected';
			statusText.textContent = 'Disconnected';
		};

		socket.onerror = () => {
			status.className = 'status-error';
			statusText.textContent = 'Error';
		};

		const liveMap = new Map();
		socket.onmessage = (event) => {
			try {
				const parsed = JSON.parse(event.data);
				if (parsed.type === "table") {
					addTable(parsed.data);
				} else if (parsed.type === "json") {
					addJson(parsed.data);					
				} else if (parsed.type === "progressBar") {
					addProgressBar(parsed.data);
				} else if (parsed.type === "live") {
					updateLive(parsed.data);
				} else if (parsed.type === "list") {
					addList(parsed.data);					
				} else if (parsed.type === "barChart") {
					addBarChart(parsed.data);					
				} else {
					addMessage(JSON.stringify(parsed), "response");
				}
			} catch {
				addMessage(event.data, "response");
			}
		};

		function sendMessage() {
			const input = document.getElementById("prompt");
			const message = input.value.trim();
			if (message) {
				addMessage(message, "user");
				socket.send(message);
				input.value = "";
			}
		}

		function addMessage(text, type) {
			const div = document.createElement("div");
			div.className = `chat-message ${type === "user" ? "user-message" : "response-message"}`;
			div.textContent = text;
			chat.appendChild(div);
			chat.scrollTop = chat.scrollHeight;
		}

		function toggleCollapse(element) {
			const content = element.nextElementSibling;
			const collapseIcon = element.querySelector('.collapse-icon');
			const container = element.parentElement;

			if (content.classList.contains('collapsed')) {
				content.classList.remove('collapsed');
				container.classList.remove('collapsed');
			} else {
				content.classList.add('collapsed');
				container.classList.add('collapsed');
			}
		}

		function getDataTypeIcon(type) {
			const iconMap = {
				//on récupère des icones de Lucid à partir des types
				'table': 'table-2',
				'json': 'code-2',
				'list': 'list',
				'tree': 'git-branch',
				'grid': 'grid-3x3',
				'database': 'database',
				'barChart': 'chart-bar', 
				'progressBar': 'rabbit' 
			};
			return iconMap[type] || 'traffic-cone'; // si non trouvé on met un traffic-cone
		}

		function addCollapsible(type, title, content) {
			const iconName = getDataTypeIcon(type);
			const html = `<div class="table-title" onclick="toggleCollapse(this)">
          	<div class="table-title-content">
            		<i data-lucide="${iconName}" class="table-icon"></i>
           	 	${title}
          	</div>
          	<i data-lucide="chevron-down" class="collapse-icon"></i>
        		</div>
			<div class="collapsible-content">${content}</div>`;

			const div = document.createElement("div");
			div.className = "chat-message response-message";
			div.innerHTML = html;
			chat.appendChild(div);

			// Initialiser les icônes Lucide pour ce nouveau contenu
			lucide.createIcons({
				nameAttr: 'data-lucide'
			});

			chat.scrollTop = chat.scrollHeight;
		}

		function addTable(tableData) {
			// Ajouter le tableau dans un conteneur collapsible
			const content = `<table><thead><tr>
        ${tableData.header.map(h => `<th>${h}</th>`).join('')}
      </tr></thead><tbody>
        ${tableData.rows.map(row =>
				`<tr>${row.map(cell => `<td>${cell}</td>`).join('')}</tr>`
			).join('')}
      </tbody></table>`;
			
			addCollapsible("table", tableData.title, content);
		}

		function addJson(jsonData) {
			const content = `<div class="json-container">${syntaxHighlight(jsonData.json)}</div>`;

			addCollapsible("json", jsonData.title, content);
		}

		function updateLive(liveData){
			const liveComponent = liveMap.get(liveData.id);
			console.log(liveComponent);
			if (liveData.action==="update") {
				liveComponent.update (liveData.value);
			}else if(liveData.action==="complete"){
				livecomponent.complete();
				liveMap.delete(liveData.id);
			}
		}
		
		function addProgressBar(progressData) {
		    // Générer un ID unique pour la barre de progression
		    //const progressId = `progressbar-${Math.random().toString(36).substr(2, 9)}`;
		    const progressId = progressData.id;
			
		    // Calculer le pourcentage initial
		    const percentage = Math.min((progressData.value / progressData.total) * 100, 100);
		    
		    // Créer le conteneur HTML pour la barre de progression
		    const content = `
		        <div class="progress-container" id="${progressId}">
		            <div class="progress-bar" style="width: ${percentage}%"></div>
		            <div class="progress-text">${Math.round(percentage)}%</div>
		        </div>
		    `;
		    
		    // Ajouter dans un conteneur collapsible
		    addCollapsible("progressBar", progressData.title || "Progression", content);
		    
			// Créer l'objet de gestion de la barre
		    const progressBar = {
		        id: progressId,
		        update(value) {
		            // Mettre à jour la valeur
		            const container = document.getElementById(progressId);
		            if (!container) {
		                console.error("Progress container not found for ID:", progressId);
		                return;
		            }
		            const newPercentage = Math.min((value / progressData.total) * 100, 100);
		            const bar = container.querySelector('.progress-bar');
		            const text = container.querySelector('.progress-text');
		            bar.style.width = `${newPercentage}%`;
		            text.textContent = `${Math.round(newPercentage)}%`;
		            
		            // Ajouter une classe pour indiquer la complétion si 100%
		            if (newPercentage >= 100) {
		                bar.classList.add('completed');
		            } else {
		                bar.classList.remove('completed');
		            }
		        },
		        complete() {
		            // Marquer comme complet (100%)
		            this.update(progressData.total);
		        }
		    };
			// Ajouter la barre à la Map
			liveMap.set(progressId, progressBar);
		}
		
		function addList(listData) {
			// Fonction récursive pour construire le HTML de la liste
			function buildList(items, type, level = 0) {
				let html = '';
				let tag = 'ol'; // Par défaut pour ORDERED
				let className = '';

				if (type === 'UNORDERED') {
					tag = 'ul';
				} else if (type === 'DASHED') {
					tag = 'ul';
					className = 'dashed-list';
				}

				html += `<${tag} class="${className}">`;

				items.forEach(item => {
					if (typeof item === 'object' && item !== null && 'items' in item) {
						// Élément avec sous-liste imbriquée
						const subType = item.type || type; // Hérite du type parent si non spécifié
						const itemTitle = item.title || ''; // Gère title: null comme chaîne vide
						html += `<li><span class="nested-title">${itemTitle}</span>`;
						html += buildList(item.items, subType, level + 1);
						html += '</li>';
					} else {
						// Élément simple
						html += `<li>${item}</li>`;
					}
				});

				html += `</${tag}>`;
				return html;
			}

			// Génère le contenu HTML de la liste
			const listHtml = buildList(listData.items, listData.type);

			// Ajoute dans un conteneur collapsible (similaire à addTable)
			addCollapsible("list", listData.title, listHtml);
		}

		function addBarChart(chartData) {
		    // Générer un ID unique pour le canvas
		    const canvasId = `barchart-${Math.random().toString(36).substr(2, 9)}`;
		    
		    // Créer le conteneur HTML pour le canvas
		    const content = `<canvas id="${canvasId}" class="chart-canvas"></canvas>`;
		    
		    // Ajouter dans un conteneur collapsible (similaire à addList et addTable)
		    addCollapsible("barChart", chartData.title, content);
		    
		    // Obtenir le contexte du canvas après ajout au DOM
		    const canvas = document.getElementById(canvasId);
		    if (!canvas) {
		        console.error("Canvas not found for ID:", canvasId);
		        return;
		    }
		    
		    // Créer la configuration Chart.js pour un graphique à barres horizontales
		    const chartConfig = {
		        type: 'bar',
		        data: {
		            labels: chartData.header,
		            datasets: [{
		                label: chartData.title,
		                data: chartData.values,
		                backgroundColor: 'rgba(29, 161, 242, 0.7)', // Bleu néon (#1DA1F2) avec transparence
		                borderColor: '#1DA1F2',
		                borderWidth: 1,
						barThickness: 20, // Épaisseur fixe des barres en pixels
						categoryPercentage: 0.8 // 80% de l'espace de la catégorie est utilisé
		            }]
		        },
		        options: {
		            indexAxis: 'y', // Rend les barres horizontales
		            responsive: true,
		            maintainAspectRatio: false,
		            plugins: {
		                legend: {
		                    display: true,
		                    labels: {
		                        color: '#E6E8EA', // --general-text
		                        font: {
		                            family: "'Inter', 'Segoe UI', system-ui, sans-serif",
		                            size: 12
		                        }
		                    }
		                }
		            },
		            scales: {
		                x: {
		                    beginAtZero: true,
		                    ticks: {
		                        color: '#E6E8EA', // --general-text
		                        font: {
		                            family: "'Inter', 'Segoe UI', system-ui, sans-serif",
		                            size: 12
		                        }
		                    },
		                    grid: {
		                        color: 'rgba(255, 255, 255, 0.1)',
		                        borderColor: '#3C4047' // --assistant-accent
		                    }
		                },
		                y: {
		                    ticks: {
		                        color: '#E6E8EA', // --general-text
		                        font: {
		                            family: "'Inter', 'Segoe UI', system-ui, sans-serif",
		                            size: 12
		                        }
		                    },
		                    grid: {
		                        color: 'rgba(255, 255, 255, 0.1)',
		                        borderColor: '#3C4047' // --assistant-accent
		                    }
		                }
		            }
		        }
		    };
		    
		    // Créer le graphique
		    new Chart(canvas.getContext('2d'), chartConfig);
		}
		function syntaxHighlight(json) {
			if (typeof json != 'string') json = JSON.stringify(json, null, 2);
			json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
			return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(?:\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
				if (/^"/.test(match)) {
					return /:$/.test(match) ? `<span class="json-key">${match}</span>` : `<span class="json-string">${match}</span>`;
				} else if (/true|false/.test(match)) {
					return `<span class="json-boolean">${match}</span>`;
				} else if (/null/.test(match)) {
					return `<span class="json-null">${match}</span>`;
				} else {
					return `<span class="json-number">${match}</span>`;
				}
			});
		}

		// Initialiser les icônes Lucide au chargement
		document.addEventListener('DOMContentLoaded', function () {
			lucide.createIcons();
		});

		document.getElementById("prompt").addEventListener("keydown", e => {
			if (e.key === "Enter") sendMessage();
		});
	</script>
