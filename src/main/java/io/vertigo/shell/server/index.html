<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<title>BANSHEE</title>

	<!-- Google Fonts -->
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

	<!-- Lucide Icons -->
	<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

	<!-- Chart JS -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-chart-sankey@0.2.0/dist/chartjs-chart-sankey.min.js" defer></script>

	<!-- Gauge JS -->
	<script src="https://bernii.github.io/gauge.js/dist/gauge.min.js"></script>
	
	<!-- Leaflet -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="header-container">
		<h1>
			BAN<span class="yellow">SHEE</span>
		</h1>
		<div id="status" class="status-disconnected">
			<div class="status-dot"></div>
			<span id="status-text">Connecting</span>
		</div>
	</div>

	<main>
		<div class="chat-container" id="chat"></div>
	</main>

	<form class="prompt-container" id="prompt-form">
		<input type="text" id="prompt" placeholder="Écrivez un message...">
		<button type="submit">Envoyer</button>
	</form>
	
	<script src="websocket.js"></script>
	<script src="components.js"></script>
	<script src="app.js"></script>
</body>
</html>
