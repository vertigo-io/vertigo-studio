<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>WebSocket avec Java et Quasar QTable</title>
    <!-- Quasar CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/quasar@2.16.1/dist/quasar.prod.css" rel="stylesheet" type="text/css">
    <!-- Material Icons via CDN -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="style.css" rel="stylesheet" type="text/css">
</head>
<body>
    <div id="app">
        <h1>Banshee</h1>
        <q-btn label="Connecter WebSocket" @click="connectWebSocket" color="primary"></q-btn>
       
        <div v-if="error" class="error">{{ error }}</div>
        
        <!-- Container pour les messages de chat -->
        <div class="chat-container">
            <div v-for="(message, index) in chatMessages" :key="index" class="chat-message"
                 :class="message.type === 'user' ? 'user-message' : 'response-message'">
                <div v-if="message.contentType === 'text'">
                    {{ message.content }}
                </div>
                <!-- =====TABLE===== -->
                <q-expansion-item
                    v-else-if="message.contentType === 'table'"
                    icon="table_chart"
                    :label="`Tableau: ${message.content.tableTitle}`"
                    expand-separator
                    expand-icon="keyboard_arrow_down"
                    default-opened
                >
                    <q-card flat bordered>
                        <q-table
                            :rows="message.content.tableRows"
                            :columns="getColumns(message.content.tableHeader)"
                            row-key="name"
                            :no-data-label="message.content.noDataFound"
                            dense
                        >
                            <template v-slot:no-data>
                                <div class="full-width row flex-center q-gutter-sm q-table__no-data">
                                    <span>{{ message.content.noDataFound }}</span>
                                </div>
                            </template>
                        </q-table>
                    </q-card>
                </q-expansion-item>
                <!-- =====/TABLE===== -->
                
                <!-- =====JSON===== -->
                <q-expansion-item
				  v-else-if="message.contentType === 'json'"
				  icon="table_chart"
				  :label="message.content.title || 'JSON Data'"
				  expand-separator
				  expand-icon="keyboard_arrow_down"
				  default-opened
				>
					<q-card flat bordered class="json-container">
 						<pre><code>{{ JSON.stringify(message.content.json, null, 2) }}</code></pre>      
				  	</q-card>
				</q-expansion-item>
            </div>
        </div>
        
        <!-- Input prompt collant en bas -->
        <div class="prompt-container">
            <q-input
                v-model="promptInput"
                placeholder="Saisissez votre question..."
                outlined
                dense
                @keyup.enter="sendPrompt"
                style="max-width: 100%;"
            >
                <template v-slot:append>
                    <q-btn
                        flat
                        dense
                        icon="send"
                        @click="sendPrompt"
                        style="color: #00E676;"
                        :disable="!promptInput.trim()"
                    />
                </template>
            </q-input>
        </div>
    </div>

    <!-- Vue.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <!-- Quasar JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/quasar@2.16.1/dist/quasar.umd.prod.js"></script>

    <script>
        const { createApp } = Vue;

        const app = createApp({
            data() {
                return {
                    ws: null,
                    error: null,
                    promptInput: '',
                    chatMessages: []
                };
            },
            methods: {
                connectWebSocket() {
                    this.error = null;
                    this.ws = new WebSocket('ws://localhost:8080');
                    this.ws.onopen = () => {
                        console.log('You are connected');
                        this.error = null;
                    };
                    this.ws.onmessage = (event) => {
                        try {
                            const msg = JSON.parse(event.data);
                            this.handleWebSocketMessage(msg);
                        } catch (e) {
                            this.addChatMessage('response', 'text', event.data);
                        }
                    };
                    this.ws.onclose = () => {
                        console.log('WebSocket fermé');
                        this.error = 'Connection is closed';
                    };
                    this.ws.onerror = (error) => {
                        console.error('Erreur WebSocket:', error);
                        this.error = 'Erreur WebSocket : Vérifiez que le serveur est en cours d\'exécution sur ws://localhost:8080/websocket';
                    };
                },
                 sendPrompt() {
                    if (this.ws && this.ws.readyState === WebSocket.OPEN && this.promptInput.trim()) {
                        const userMessage = this.promptInput.trim();
                        this.addChatMessage('user', 'text', userMessage);
                        this.ws.send(JSON.stringify({ type: 'prompt', data: userMessage }));
                        this.promptInput = '';
                        this.$nextTick(() => {
                            this.scrollToBottom();
                        });
                    } else {
                        this.error = this.ws ? 'Saisie vide' : 'WebSocket non connecté';
                    }
                },
                addChatMessage(type, contentType, content) {
                    this.chatMessages.push({
                        type: type,
                        contentType: contentType || 'text',
                        content: content,
                        timestamp: new Date()
                    });
                },
                handleWebSocketMessage(msg) {
                    if (msg.type === 'table') {
                        this.addChatMessage('response', 'table',  msg.data);
                    }else if (msg.type === 'json') {
                        this.addChatMessage('response', 'json',  msg.data);
                    } else if (msg.type === 'response' || msg.type === 'message') {
                        this.addChatMessage('response', 'text', msg.data || msg.message || 'Réponse reçue');
                    } else {
                        this.addChatMessage('response', 'text', JSON.stringify(msg));
                    }
                    this.$nextTick(() => {
                        this.scrollToBottom();
                    });
                },
                getColumns(header) {
                    return header.map((col, index) => ({
                        name: `col${index}`,
                        label: col,
                        field: row => row[index],
                        align: 'left'
                    }));
                },
                scrollToBottom() {
                    const chatContainer = document.querySelector('.chat-container');
                    if (chatContainer) {
                        chatContainer.scrollTop = chatContainer.scrollHeight;
                    }
                }
            }
        });

        app.use(Quasar, { config: { iconSet: 'material-icons' } });
        app.mount('#app');
    </script>
</body>
</html>
