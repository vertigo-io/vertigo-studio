<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Terminal Web</title>
    <!-- Quasar CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/quasar@2.16.1/dist/quasar.prod.css" rel="stylesheet" type="text/css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/xterm/3.14.5/xterm.min.css" />
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 10px; background-color: #000; }
        #terminal { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="app">
        <h1>Communication WebSocket avec Java</h1>
        <div id="terminal"></div>
    </div>

    <!-- Vue.js via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
    <!-- Quasar JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/quasar@2.16.1/dist/quasar.umd.prod.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xterm/3.14.5/xterm.min.js"></script>

    <script>
        const { createApp } = Vue;

        const app = createApp({
            data() {
                return {
                    ws: null,
                    term: null
                };
            },
            mounted() {
                this.initTerminal();
                this.connectWebSocket();
            },
            methods: {
                initTerminal() {
                    this.term = new Terminal();
                    this.term.open(document.getElementById('terminal'));

                    this.term.onData(data => {
                        // Simple local echo
                        this.term.write(data);
                        if (this.ws && this.ws.readyState === WebSocket.OPEN) {
                            this.ws.send(data);
                        }
                    });
                },
                connectWebSocket() {
                    this.ws = new WebSocket('ws://localhost:8887'); // Use port 8887 for XtermServer
                    this.ws.onopen = () => {
                        console.log('WebSocket connecté');
                        this.term.write('Connected to shell\r\n');
                    };
                    this.ws.onmessage = (event) => {
                        this.term.write(event.data);
                    };
                    this.ws.onclose = () => {
                        console.log('WebSocket fermé');
                        this.term.write('\r\nConnection closed');
                    };
                    this.ws.onerror = (error) => {
                        console.error('Erreur WebSocket:', error);
                        this.term.write('\r\n\u001B[31mWebSocket Error: ' + error + '\u001B[0m\r\n');
                    };
                }
            }
        });

        // Intégrer Quasar à l'app Vue
        app.use(Quasar, {
            config: {} // Options Quasar si besoin
        });

        app.mount('#app');
    </script>
</body>
</html>
