<!DOCTYPE html>
<html lang="fr">

<head>
	<meta charset="UTF-8">
	<title>BANSHEE</title>

	<!-- Google Fonts -->
	<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

	<!-- Lucide Icons -->
	<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

	<!-- Chart JS -->
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-sankey"></script>

	<!-- Gauge JS -->
	<script src="https://bernii.github.io/gauge.js/dist/gauge.min.js"></script>
	
	<!-- Leaflet -->
	<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
	<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

	    <!-- Vue.js -->
	    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.min.js"></script>
	
	    <!-- Vuetify -->
	    <link href="https://cdn.jsdelivr.net/npm/@mdi/font@6.x/css/materialdesignicons.min.css" rel="stylesheet">
	    <link href="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.min.css" rel="stylesheet">
	    <script src="https://cdn.jsdelivr.net/npm/vuetify@2.x/dist/vuetify.js"></script>
	<link rel="stylesheet" href="style.css">
	<link rel="icon" type="image/png" href="./favicon.png">
</head>

<body>
    <div id="app">
        <div class="header-container">
            <h1>
                BAN<span class="yellow">SHEE</span>
            </h1>
			<div id="status" :class="statusClass">
				<div class="status-dot"></div>
				<span id="status-text">{{statusText}}</span>
			</div>
		</div>

        <main>
            <div class="chat-container" id="chat">
                <div v-for="message in messages" :class="message.cssClass">
                    <component v-if="message.isComponent" :is="message.content" :data="message.data"></component>
                    <div v-else>{{ message.content }}</div>
                </div>
            </div>
        </main>

        <form class="prompt-container" @submit.prevent="sendMessage">
            <input type="text" v-model="prompt" placeholder="Écrivez un message...">
            <button type-="submit">Envoyer</button>
        </form>
    </div>
	
    <script src="v-components/v-table-component.js"></script>
    <script src="v-components/v-chakra-tree-component.js"></script>
    <script src="v-components/dataviz/v-chakra-bar-chart-component.js"></script>
    <script src="v-components/v-gauge-component.js"></script>
    <script src="v-components/v-progress-bar-component.js"></script>
    <script src="v-components/v-rating-component.js"></script>
    <script src="v-components/v-spark-line-component.js"></script>
    <script src="v-components/dataviz/v-chakra-pie-chart-component.js"></script>
    <script src="v-components/dataviz/v-chakra-donut-chart-component.js"></script>
    <script src="v-components/dataviz/v-chakra-area-chart-component.js"></script>
    <script src="v-components/v-status-component.js"></script>
    <script src="v-components/v-chakra-paragraph-component.js"></script>
    <script src="v-components/v-text-path-component.js"></script>
    <script src="v-components/v-chakra-title-component.js"></script>
    <script src="v-components/v-chakra-card-component.js"></script>
    <script src="v-components/v-chakra-video-component.js"></script>
    <script src="v-components/v-geo-map-component.js"></script>
    <script src="v-components/v-photo-component.js"></script>
    <script src="v-components/v-rss-component.js"></script>
    <script src="v-components/v-sankey-component.js"></script>
    <script src="v-components/dataviz/v-chakra-radar-chart-component.js"></script>
    <script src="v-components/v-form-component.js"></script>
    <script src="v-components/v-error-component.js"></script>
	<script src="v-components/v-chakra-table-component.js"></script>
	<script src="v-components/v-chakra-list-component.js"></script>
	<script src="v-components/v-chakra-json-component.js"></script>
	<script src="v-components/v-figlet-component.js"></script>
	<script src="v-app.js"></script>
</body>
</html>
